name: Build AVAAL Watermark

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install Pillow pyinstaller

      - name: Build Windows EXE
        run: pyinstaller --onefile --windowed --name AVAAL_Watermark --add-data="watermark_logo.png;." watermark_app.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AVAAL_Windows
          path: dist/AVAAL_Watermark.exe


  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install Pillow pyinstaller

      - name: Build Mac App
        run: pyinstaller --onedir --windowed --name AVAAL_Watermark --add-data="watermark_logo.png:." watermark_app.py

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AVAAL_Mac
          path: dist/